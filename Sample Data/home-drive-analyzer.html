        /* ===== Session Bar Styles ===== */

<body>
    <div id="root"></div>

    <script>
    (function() {
        'use strict';
        var e = React.createElement;
        var useState = React.useState;
        var useMemo = React.useMemo;
        var useEffect = React.useEffect;

        // ===== Utility Functions =====
        function formatSize(bytes) {
            if (bytes == null || isNaN(bytes)) return '0 B';
            if (bytes === 0) return '0 B';
            var units = ['B', 'KB', 'MB', 'GB', 'TB'];
            var i = Math.floor(Math.log(Math.abs(bytes)) / Math.log(1024));
            var idx = Math.min(i, units.length - 1);
            return (bytes / Math.pow(1024, idx)).toFixed(idx === 0 ? 0 : 2) + ' ' + units[idx];
        }

        function parseSizeToBytes(value, numberFormat) {
            if (value == null || value === '' || isNaN(Number(value))) return 0;
            var num = Number(value);
            if (!numberFormat) return num;
            var fmt = numberFormat.toUpperCase();
            if (fmt.includes('TB')) return num * Math.pow(1024, 4);
            if (fmt.includes('GB')) return num * Math.pow(1024, 3);
            if (fmt.includes('MB')) return num * Math.pow(1024, 2);
            if (fmt.includes('KB')) return num * 1024;
            return num;
        }

        // ===== Fuzzy Name Matching =====
        function levenshteinDistance(s1, s2) {
            // Guard against null/undefined inputs
            if (!s1) s1 = '';
            if (!s2) s2 = '';
            var m = s1.length, n = s2.length;
            var dp = [];
            for (var i = 0; i <= m; i++) {
                dp[i] = [];
                for (var j = 0; j <= n; j++) {
                    dp[i][j] = 0;
                }
            }
            for (var i = 0; i <= m; i++) dp[i][0] = i;
            for (var j = 0; j <= n; j++) dp[0][j] = j;
            for (var i = 1; i <= m; i++) {
                for (var j = 1; j <= n; j++) {
                    if (s1[i - 1] === s2[j - 1]) {
                        dp[i][j] = dp[i - 1][j - 1];
                    } else {
                        dp[i][j] = 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
                    }
                }
            }
            return dp[m][n];
        }

        function normalizeUsername(name) {
            // Remove spaces, dots, underscores; lowercase
            return name.toLowerCase().replace(/[\s._-]/g, '');
        }

        function findBestMatch(sourceUsername, targetNames) {
            // Guard against null/undefined inputs
            if (!sourceUsername || !targetNames || targetNames.length === 0) {
                return null;
            }
            var normalized = normalizeUsername(sourceUsername);
            var best = { name: null, score: Infinity, distance: Infinity };
            targetNames.forEach(function(target) {
                if (!target) return; // Skip null/undefined targets
                var targetNorm = normalizeUsername(target);
                var distance = levenshteinDistance(normalized, targetNorm);
                if (distance < best.distance) {
                    best = { name: target, score: distance, distance: distance };
                }
            });
            return best.distance <= 3 ? best.name : null; // Match if within 3 edits
        }

        // ===== CSV Parser =====
        function parseOneDriveCSV(csvText) {
            var lines = csvText.split('\n');
            if (lines.length < 2) throw new Error('CSV file appears to be empty');

            var headers = lines[0].split(',').map(function(h) { return h.trim(); });
            var ownerColIdx = headers.indexOf('Owner Display Name');
            var principalColIdx = headers.indexOf('Owner Principal Name');
            var storageColIdx = headers.indexOf('Storage Used (Byte)');
            var storageAllocColIdx = headers.indexOf('Storage Allocated (Byte)');
            var deletedColIdx = headers.indexOf('Is Deleted');

            if (ownerColIdx === -1 || principalColIdx === -1 || storageColIdx === -1) {
                throw new Error('CSV missing required columns: Owner Display Name, Owner Principal Name, Storage Used (Byte)');
            }

            var users = {};
            for (var i = 1; i < lines.length; i++) {
                var line = lines[i].trim();
                if (!line) continue;

                // Simple CSV parsing (handles quoted fields)
                var cells = [];
                var current = '';
                var inQuote = false;
                for (var j = 0; j < line.length; j++) {
                    var char = line[j];
                    if (char === '"') {
                        inQuote = !inQuote;
                    } else if (char === ',' && !inQuote) {
                        cells.push(current.trim().replace(/^"|"$/g, ''));
                        current = '';
                    } else {
                        current += char;
                    }
                }
                cells.push(current.trim().replace(/^"|"$/g, ''));

                if (cells.length <= Math.max(ownerColIdx, principalColIdx, storageColIdx)) continue;

                var ownerName = cells[ownerColIdx].trim();
                var isDeleted = deletedColIdx >= 0 ? cells[deletedColIdx].trim().toLowerCase() === 'true' : false;
                if (!ownerName || isDeleted) continue;

                users[normalizeUsername(ownerName)] = {
                    displayName: ownerName,
                    principalName: cells[principalColIdx],
                    storageUsed: parseInt(cells[storageColIdx]) || 0,
                    storageAllocated: storageAllocColIdx >= 0 ? (parseInt(cells[storageAllocColIdx]) || 0) : 0
                };
            }
            return users;
        }

        // ===== Excel Parser =====
        function parseTreeSizeExcel(workbook) {
            var sheetName = workbook.SheetNames[0];
            var sheet = workbook.Sheets[sheetName];
            var range = XLSX.utils.decode_range(sheet['!ref']);

            var headerRow = -1;
            for (var r = 0; r <= Math.min(range.e.r, 10); r++) {
                var cell = sheet[XLSX.utils.encode_cell({ r: r, c: 0 })];
                if (cell && String(cell.v).trim() === 'Full Path') {
                    headerRow = r;
                    break;
                }
            }
            if (headerRow === -1) throw new Error('Could not find "Full Path" header in Excel file');

            var headers = [];
            for (var c = 0; c <= range.e.c; c++) {
                var hc = sheet[XLSX.utils.encode_cell({ r: headerRow, c: c })];
                headers.push(hc ? String(hc.v).trim() : 'Col' + c);
            }

            var colIdx = {};
            headers.forEach(function(h, i) { colIdx[h] = i; });

            var pathCol = colIdx['Full Path'];
            var sizeCol = colIdx['Size'];
            var allocCol = colIdx['Allocated'];
            var filesCol = colIdx['Files'];
            var foldersCol = colIdx['Folders'];
            var lastModCol = colIdx['Last Modified'];
            var ownerCol = colIdx['Owner'];

            var rows = [];
            for (var r2 = headerRow + 1; r2 <= range.e.r; r2++) {
                var pathCell = sheet[XLSX.utils.encode_cell({ r: r2, c: pathCol })];
                if (!pathCell || !pathCell.v) continue;

                var fullPath = String(pathCell.v).trim();
                var sizeCell = sheet[XLSX.utils.encode_cell({ r: r2, c: sizeCol })];
                var allocCell = sheet[XLSX.utils.encode_cell({ r: r2, c: allocCol })];
                var filesCell = sheet[XLSX.utils.encode_cell({ r: r2, c: filesCol })];
                var foldersCell = sheet[XLSX.utils.encode_cell({ r: r2, c: foldersCol })];
                var lastModCell = sheet[XLSX.utils.encode_cell({ r: r2, c: lastModCol })];
                var ownerCell = sheet[XLSX.utils.encode_cell({ r: r2, c: ownerCol })];

                var sizeBytes = parseSizeToBytes(
                    sizeCell ? sizeCell.v : 0,
                    sizeCell ? sizeCell.z : null
                );
                var allocBytes = parseSizeToBytes(
                    allocCell ? allocCell.v : 0,
                    allocCell ? allocCell.z : null
                );

                rows.push({
                    fullPath: fullPath,
                    sizeBytes: sizeBytes,
                    allocBytes: allocBytes,
                    files: filesCell ? Number(filesCell.v) || 0 : 0,
                    folders: foldersCell ? Number(foldersCell.v) || 0 : 0,
                    lastModified: lastModCell ? (lastModCell.w || '') : '',
                    owner: ownerCell ? String(ownerCell.v || '') : ''
                });
            }
            return rows;
        }

        // ===== Build User-Level Tree =====
        function buildUserTree(rows) {
            var basePrefix = '';
            for (var ri = 0; ri < rows.length; ri++) {
                var p = rows[ri].fullPath.replace(/\\+$/, '');
                var pts = p.replace(/^\\\\/, '').split('\\');
                if (pts.length === 2) {
                    basePrefix = p + '\\';
                    break;
                }
            }
            if (!basePrefix) {
                var firstPath = (rows[0] && rows[0].fullPath) || '';
                var m = firstPath.match(/^(\\\\[^\\]+\\[^\\]+\\)/);
                if (m) basePrefix = m[1];
                else throw new Error('Cannot detect base path from data');
            }

            var basePrefixLower = basePrefix.toLowerCase();
            var users = {};

            // Pass 1: collect all data per user
            rows.forEach(function(row) {
                var path = row.fullPath;
                if (path.toLowerCase().indexOf(basePrefixLower) !== 0) return;

                var relative = path.substring(basePrefix.length).replace(/\\+$/, '');
                if (!relative) return;

                var parts = relative.split('\\').filter(function(x) { return x; });
                if (parts.length === 0) return;

                var username = parts[0];
                if (username === '*.*') return;

                if (!users[username]) {
                    users[username] = {
                        name: username, sizeBytes: 0, allocBytes: 0,
                        files: 0, folders: 0, recycleBinSizeBytes: 0,
                        recycleBinFiles: 0, lastModified: '', owner: '',
                        subFolders: [], hasRecycleBin: false,
                        _hasRootEntry: false,
                        path: basePrefix + username
                    };
                }

                var user = users[username];

                // User root entry (e.g. \\BHFP03\NationalHomeDrives\Username\)
                if (parts.length === 1) {
                    user.sizeBytes = row.sizeBytes;
                    user.allocBytes = row.allocBytes;
                    user.files = row.files;
                    user.folders = row.folders;
                    user.lastModified = row.lastModified;
                    user.owner = row.owner;
                    user._hasRootEntry = true;
                }

                // Direct subfolder of user (depth 2, e.g. Username\Documents\)
                // Skip *.* entries - those are loose files already counted in parent totals
                if (parts.length === 2 && parts[1] !== '*.*') {
                    var subName = parts[1];
                    var existing = user.subFolders.find(function(s) { return s.name === subName; });
                    if (!existing) {
                        existing = {
                            name: subName, sizeBytes: 0, files: 0, folders: 0,
                            isRecycleBin: subName.toUpperCase() === '$RECYCLE.BIN',
                            isLooseFiles: false
                        };
                        user.subFolders.push(existing);
                    }
                    existing.sizeBytes = row.sizeBytes;
                    existing.files = row.files;
                    existing.folders = row.folders;
                }

                // *.* at depth 2 = loose files in user root folder
                if (parts.length === 2 && parts[1] === '*.*') {
                    var existingLoose = user.subFolders.find(function(s) { return s.name === '[Loose Files]'; });
                    if (!existingLoose) {
                        existingLoose = { name: '[Loose Files]', sizeBytes: 0, files: 0, folders: 0, isRecycleBin: false, isLooseFiles: true };
                        user.subFolders.push(existingLoose);
                    }
                    existingLoose.sizeBytes = row.sizeBytes;
                    existingLoose.files = row.files;
                }

                // Detect $RECYCLE.BIN folder entries at ANY depth under this user.
                // TreeSize sizes are inclusive (parent includes children), so we only
                // count each $RECYCLE.BIN folder entry itself, not its children.
                // These are already included in the user's total size - we track them
                // so we can subtract them to get "data to migrate".
                for (var i = 1; i < parts.length; i++) {
                    if (parts[i].toUpperCase() === '$RECYCLE.BIN' && i === parts.length - 1) {
                        user.recycleBinSizeBytes += row.sizeBytes;
                        user.recycleBinFiles += row.files;
                        user.hasRecycleBin = true;
                        break;
                    }
                }
            });

            // Pass 2: for users WITHOUT a root entry, compute totals from subfolders
            // TreeSize "Level N" exports only include root rows for the top N items
            Object.values(users).forEach(function(user) {
                if (!user._hasRootEntry) {
                    // Sum subfolder sizes (NOT *.* - those are already inside subfolder totals)
                    var totalSize = 0, totalFiles = 0, totalFolders = 0;
                    // Also sum *.* (loose files) since they're NOT inside any subfolder
                    user.subFolders.forEach(function(sub) {
                        totalSize += sub.sizeBytes;
                        totalFiles += sub.files;
                        totalFolders += sub.folders;
                    });
                    user.sizeBytes = totalSize;
                    user.files = totalFiles;
                    user.folders = totalFolders;
                }
                // Clean up internal flag
                delete user._hasRootEntry;
            });

            return Object.values(users);
        }

                children.push(e('div', { key: 'expanded', className: 'tree-children' }, expandedItems));
            }

            return e('div', { className: 'tree-item' }, children);
        }

                if (isNaN(n) || n < 1) { alert('Please enter a valid number of waves (1 or more).'); return; }
                if (!users || users.length === 0) { alert('No user data loaded yet.'); return; }
                if (n > users.length) { alert('Number of waves (' + n + ') cannot exceed number of users (' + users.length + ').'); return; }
                if (!window.confirm('This will replace all existing waves and assignments. Continue?')) return;

                // Build new waves
                var newWaves = [];
                for (var i = 0; i < n; i++) {
                    newWaves.push({
                        id: (Date.now() + i).toString(),
                        name: 'Wave ' + (i + 1),
                        color: WAVE_COLORS[i % WAVE_COLORS.length]
                    });
                }

                // Sort users by net migrate size descending (largest first)
                var sorted = users.slice().sort(function(a, b) {
                    var sizeA = (a.sizeBytes || 0) - (a.recycleBinSizeBytes || 0);
                    var sizeB = (b.sizeBytes || 0) - (b.recycleBinSizeBytes || 0);
                    return sizeB - sizeA;
                });

                // Greedy assignment: always assign next user to the wave with the least total size
                var waveTotals = newWaves.map(function() { return 0; });
                var newAssignments = {};

                sorted.forEach(function(u) {
                    // Find wave index with smallest current total
                    var minIdx = 0;
                    for (var j = 1; j < n; j++) {
                        if (waveTotals[j] < waveTotals[minIdx]) minIdx = j;
                    }
                    newAssignments[u.name] = newWaves[minIdx].id;
                    waveTotals[minIdx] += (u.sizeBytes || 0) - (u.recycleBinSizeBytes || 0);
                });

                setWaves(newWaves);
                setWaveAssignments(newAssignments);
                setNewWaveName('Wave ' + (n + 1));
                setExportWaveId(newWaves[0].id);
                setAddToWaveId(newWaves[0].id);
            }

                    setLoading(false);

                    setError('Error reading Excel file: ' + err.message);
                    setLoading(false);

                var mappedCount = 0, unmappedCount = 0;
                users.forEach(function(u) {
                    totalSizeBytes += u.sizeBytes;
                    totalFiles += u.files;
                    totalRecycleBinBytes += u.recycleBinSizeBytes;
                    totalRecycleBinFiles += u.recycleBinFiles;

                return {

                    totalRecycleBinBytes: totalRecycleBinBytes, totalRecycleBinFiles: totalRecycleBinFiles,
                    migrateSize: totalSizeBytes - totalRecycleBinBytes,
                    migrateFiles: totalFiles - totalRecycleBinFiles,
                    usersWithRecycleBin: usersWithRecycleBin,
                    mappedCount: mappedCount, unmappedCount: unmappedCount,
                    selectedCount: selectedKeys.length, selectedSize: selectedSize, selectedFiles: selectedFiles
                };
            }, [users, selectedUsers, userMappings, oneDriveData]);

            // Filter and sort
            var sortedFilteredUsers = useMemo(function() {
                var filtered = users;
                if (searchTerm) {
                    var term = searchTerm.toLowerCase();
                    filtered = users.filter(function(u) {
                        return u.name.toLowerCase().indexOf(term) >= 0 || u.owner.toLowerCase().indexOf(term) >= 0;
                    });
                }
                // Apply mapping filter
                if (mappingFilter !== 'all') {
                    filtered = filtered.filter(function(u) {
                        var mapping = userMappings[u.name];
                        if (mappingFilter === 'mapped') return mapping && mapping.isMapped;
                        if (mappingFilter === 'unmapped') return !mapping || !mapping.isMapped;
                        return true;
                    });
                }
                return filtered.slice().sort(function(a, b) {
                    var cmp = 0;
                    switch (sortBy) {
                        case 'name': cmp = a.name.localeCompare(b.name); break;
                        case 'size': cmp = (a.sizeBytes - a.recycleBinSizeBytes) - (b.sizeBytes - b.recycleBinSizeBytes); break;
                        case 'totalSize': cmp = a.sizeBytes - b.sizeBytes; break;
                        case 'files': cmp = a.files - b.files; break;
                        case 'recycle': cmp = a.recycleBinSizeBytes - b.recycleBinSizeBytes; break;
                        default: cmp = a.name.localeCompare(b.name);
                    }
                    return sortDir === 'asc' ? cmp : -cmp;

                        setSessionFileName(file.name);

                                    if (normSource === normTarget) {
                                        targetName = target.displayName;
                                    }
                                }
                            }
                        });
                    }

                    mappings[user.name] = {
                        isMapped: !!targetName,

            // ===== Session useEffect Hooks =====

            useEffect(function() {

                        e('div', { className: 'wave-mgmt-divider' }),

                        // Auto-generate waves
                        e('span', { className: 'wave-mgmt-label' }, 'Auto-Generate:'),
                        e('input', {
                            type: 'number', min: '1', className: 'wave-name-input',
                            style: { width: '64px', textAlign: 'center' },
                            value: autoWaveCount,
                            placeholder: 'n',
                            onChange: function(ev) { setAutoWaveCount(ev.target.value); },
                            onKeyDown: function(ev) { if (ev.key === 'Enter') autoGenerateWaves(); }
                        }),
                        e('button', {
                            className: 'btn btn-primary',
                            disabled: !users || users.length === 0,
                            style: { opacity: (!users || users.length === 0) ? 0.5 : 1 },
                            onClick: autoGenerateWaves
                        }, '\u26A1 Generate Waves'),

                        e('div', { className: 'wave-mgmt-divider' }),

                        // Select actions
                        e('span', { className: 'wave-mgmt-label' }, 'Select:'),
                        e('button', { className: 'btn', onClick: selectAll }, 'All Visible'),
                        e('button', { className: 'btn', onClick: deselectAll }, 'None'),
                        e('span', { style: { fontSize: '13px', color: '#0078d4', fontWeight: '600' } },
                            stats.selectedCount + ' selected'
                        ),

                        // Add selected to wave (only show if waves exist and something is selected)
                        waves.length > 0 ? e('div', { className: 'wave-mgmt-divider' }) : null,
                        waves.length > 0 ? e('span', { className: 'wave-mgmt-label' }, 'Add to wave:') : null,
                        waves.length > 0 ? e('select', {
                            className: 'wave-select',
                            value: addToWaveId,
                            onChange: function(ev) { setAddToWaveId(ev.target.value); }
                        },
                            e('option', { value: '' }, '-- select wave --'),
                            waves.map(function(w) {
                                return e('option', { key: w.id, value: w.id }, w.name);
                            })
                        ) : null,
                        waves.length > 0 ? e('button', {
                            className: 'btn btn-success',
                            disabled: stats.selectedCount === 0 || !addToWaveId,
                            style: { opacity: (stats.selectedCount === 0 || !addToWaveId) ? 0.5 : 1 },
                            onClick: function() {
                                if (!addToWaveId) return;
                                var names = Object.keys(selectedUsers).filter(function(k) { return selectedUsers[k]; });
                                assignToWave(names, addToWaveId);
                                setSelectedUsers({});
                            }
                        }, 'Add (' + stats.selectedCount + ')') : null,

                        e('div', { style: { marginLeft: 'auto' } }),

                        // Export wave JSON
                        waves.length > 0 ? e('div', { className: 'wave-mgmt-divider' }) : null,
                        waves.length > 0 ? e('span', { className: 'wave-mgmt-label' }, 'Export:') : null,
                        waves.length > 0 ? e('select', {
                            className: 'wave-select',
                            value: exportWaveId,
                            onChange: function(ev) { setExportWaveId(ev.target.value); }
                        },
                            e('option', { value: '' }, '-- select wave --'),
                            waves.map(function(w) {
                                var count = users.filter(function(u) { return waveAssignments[u.name] === w.id; }).length;
                                return e('option', { key: w.id, value: w.id }, w.name + ' (' + count + ' users)');
                            })
                        ) : null,
                        waves.length > 0 ? e('button', {
                            className: 'btn btn-success',
                            disabled: !exportWaveId,
                            style: { opacity: !exportWaveId ? 0.5 : 1 },
                            onClick: function() { if (exportWaveId) exportWaveJSON(exportWaveId); }
                        }, '\u2913 Export JSON') : null
                    )
                );

                // Controls
                var controlsChildren = [
                    e('input', {
                        type: 'text', className: 'search-box',
                        placeholder: 'Search users by name or owner...',
                        value: searchTerm,
                        onChange: function(ev) { setSearchTerm(ev.target.value); }
                    }),
                    e('div', { className: 'filter-group' },
                        e('span', { className: 'filter-label' }, 'Sort:'),
                        e('button', { className: 'btn' + (sortBy === 'name' ? ' active' : ''), onClick: function() { toggleSort('name'); } }, 'Name' + sortArrow('name')),
                        e('button', { className: 'btn' + (sortBy === 'size' ? ' active' : ''), onClick: function() { toggleSort('size'); } }, 'Migrate Size' + sortArrow('size')),
                        e('button', { className: 'btn' + (sortBy === 'totalSize' ? ' active' : ''), onClick: function() { toggleSort('totalSize'); } }, 'Total Size' + sortArrow('totalSize')),
                        e('button', { className: 'btn' + (sortBy === 'files' ? ' active' : ''), onClick: function() { toggleSort('files'); } }, 'Files' + sortArrow('files')),
                        e('button', { className: 'btn' + (sortBy === 'recycle' ? ' active' : ''), onClick: function() { toggleSort('recycle'); } }, 'Recycle Bin' + sortArrow('recycle'))
                    )
                ];

                // Add mapping filter if CSV is loaded
                if (Object.keys(oneDriveData).length > 0) {
                    controlsChildren.push(
                        e('div', { className: 'filter-group' },
                            e('span', { className: 'filter-label' }, 'Mapping:'),
                            e('button', { className: 'btn' + (mappingFilter === 'all' ? ' active' : ''), onClick: function() { setMappingFilter('all'); } }, 'All'),
                            e('button', { className: 'btn' + (mappingFilter === 'mapped' ? ' active' : ''), onClick: function() { setMappingFilter('mapped'); } }, 'Mapped'),
                            e('button', { className: 'btn' + (mappingFilter === 'unmapped' ? ' active' : ''), onClick: function() { setMappingFilter('unmapped'); } }, 'Unmapped')
                        )
                    );
                }

                content.push(e('div', { key: 'controls', className: 'controls-section' }, controlsChildren));

                // Helper to build a UserRow element
                function makeUserRow(user, extraProps) {
                    return e(UserRow, Object.assign({
                        key: user.name,
                        user: user,
                        isExpanded: !!expandedUsers[user.name],
                        isSelected: !!selectedUsers[user.name],
                        onToggleExpand: toggleExpand,
                        onToggleSelect: toggleSelect,
                        mapping: null,
                        oneDriveData: oneDriveData,
                        onSetManualMapping: setManualMapping,
                        userMappings: userMappings,
                        manualMappings: manualMappings,
                        waveAssignments: waveAssignments,
                        waves: waves,
                        draggedUser: draggedUser,
                        setDraggedUser: setDraggedUser,
                        onRemoveFromWave: removeFromWave
                    }, extraProps || {}));
                }

                var tableHeaderContent = e('div', { className: 'table-header' },
                    e('span', { style: { width: '14px', flexShrink: 0 } }),
                    e('div', { className: 'checkbox-wrapper', style: { visibility: 'hidden' } }, e('input', { type: 'checkbox', readOnly: true })),
                    e('span', { className: 'icon' }),
                    e('span', { className: 'folder-name' }, 'User Folder'),
                    e('div', { className: 'folder-meta' },
                        e('span', { className: 'col-total' }, 'Total Size'),
                        e('span', { className: 'col-recycle' }, 'Recycle Bin'),
                        e('span', { className: 'col-files' }, 'Files'),
                        Object.keys(oneDriveData).length > 0 ? e('span', { className: 'col-mapping' }, 'Mapping') : null,
                        e('span', { className: 'col-migrate' }, 'Migrate Size'),
                        Object.keys(oneDriveData).length > 0 ? e('span', { className: 'col-postmigrate' }, 'After Migration') : null
                    )
                );

                var treeContent;

                if (waves.length === 0) {
                    // No waves yet — flat list as before
                    var treeRows = sortedFilteredUsers.map(function(user) { return makeUserRow(user); });
                    treeContent = e('div', { className: 'tree-view' }, treeRows);
                } else {
                    // Grouped by wave
                    var groupedContent = [];

                    waves.forEach(function(wave) {
                        var waveUsers = sortedFilteredUsers.filter(function(u) {
                            return waveAssignments[u.name] === wave.id;
                        });
                        var waveSize = waveUsers.reduce(function(sum, u) { return sum + u.sizeBytes - u.recycleBinSizeBytes; }, 0);
                        var isDragTarget = dragOverWaveId === wave.id;

                        var waveHeaderEl = e('div', {
                            key: 'wh-' + wave.id,
                            className: 'wave-header' + (isDragTarget ? ' drag-over' : ''),
                            style: { borderLeftColor: wave.color },
                            onDragOver: function(ev) { ev.preventDefault(); setDragOverWaveId(wave.id); },
                            onDragLeave: function(ev) { setDragOverWaveId(null); },
                            onDrop: function(ev) {
                                ev.preventDefault();
                                setDragOverWaveId(null);
                                if (draggedUser) { assignToWave([draggedUser], wave.id); setDraggedUser(null); }
                            }
                        },
                            e('span', { className: 'wave-dot', style: { background: wave.color } }),
                            e('span', { className: 'wave-header-name' }, wave.name),
                            e('span', { className: 'wave-header-meta' },
                                waveUsers.length + ' users · ' + formatSize(waveSize) + ' to migrate'
                            ),
                            e('div', { className: 'wave-header-actions' },
                                e('button', {
                                    className: 'btn btn-danger',
                                    onClick: function(ev) { ev.stopPropagation(); deleteWave(wave.id); }
                                }, '✕ Delete Wave')
                            )
                        );

                        var waveBody = waveUsers.length > 0
                            ? waveUsers.map(function(user) { return makeUserRow(user); })
                            : [e('div', { key: 'empty', className: 'wave-empty-hint' },
                                'Drop users here or select users and click "Add"')];

                        groupedContent.push(
                            e('div', { key: 'wave-' + wave.id, className: 'wave-group' },
                                waveHeaderEl,
                                e('div', { className: 'tree-view' }, waveBody)
                            )
                        );
                    });

                    // Unassigned users
                    var unassignedUsers = sortedFilteredUsers.filter(function(u) {
                        return !waveAssignments[u.name];
                    });

                    if (unassignedUsers.length > 0) {
                        groupedContent.push(
                            e('div', { key: 'unassigned-header', className: 'unassigned-header' },
                                'Unassigned (' + unassignedUsers.length + ')'
                            )
                        );
                        groupedContent.push(
                            e('div', { key: 'unassigned-rows', className: 'tree-view' },
                                unassignedUsers.map(function(user) { return makeUserRow(user); })
                            )
                        );
                    }

                    treeContent = e('div', null, groupedContent);
                }

                content.push(
                    e('div', { key: 'viewer', className: 'viewer-section' },
                        tableHeaderContent,
                        treeContent,
                        sortedFilteredUsers.length === 0 && searchTerm ?
                            e('div', { className: 'empty-state' }, e('div', null, 'No users match "' + searchTerm + '"')) : null
                    )
                );
            }

            // Empty state
            if (!loading && users.length === 0) {
                content.push(
                    e('div', { key: 'empty', className: 'empty-state' },
                        e('div', { className: 'empty-state-icon' }, '\uD83D\uDCCA'),
                        e('div', null, 'No data loaded'),
                        e('div', { style: { fontSize: '14px', marginTop: '8px' } },
                            'Upload a TreeSize Excel report (.xlsx) and OneDrive CSV to analyze migration mappings')
                    )
                );
            }

            return e('div', { className: 'container' }, content);
        }

        ReactDOM.render(e(App), document.getElementById('root'));
    })();
    </script>
</body>
</html>
